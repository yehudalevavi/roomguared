<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛡️ שומר החדר</title>
<style>
  :root {
    --bg: #1b1b3a;
    --card: #2a2a5a;
    --card-hover: #33336a;
    --green: #2ecc71;
    --green-glow: rgba(46,204,113,0.3);
    --red: #ff6b6b;
    --red-glow: rgba(255,107,107,0.3);
    --yellow: #ffd93d;
    --yellow-glow: rgba(255,217,61,0.3);
    --blue: #6c5ce7;
    --blue-glow: rgba(108,92,231,0.3);
    --purple: #a29bfe;
    --pink: #fd79a8;
    --orange: #fdcb6e;
    --text: #fff;
    --muted: #b0b0d0;
    --card-border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #1b1b3a 0%, #2d1b69 50%, #1b1b3a 100%);
    color: var(--text);
    padding: 12px;
    max-width: 500px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 16px; position: relative; padding-top: 8px; }
  .header .mascot { font-size: 3.5rem; display: block; margin-bottom: 4px; animation: bounce 2s ease infinite; pointer-events: none; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .header h1 { font-size: 1.6rem; font-weight: 800; }
  .lang-btn {
    position: absolute; top: 0; left: 0;
    background: var(--card); border: 2px solid var(--card-border);
    color: var(--text); border-radius: 12px; padding: 8px 16px;
    font-size: 1.1rem; cursor: pointer; font-weight: 700;
    transition: background 0.2s; z-index: 10;
  }
  [dir="ltr"] .lang-btn { left: auto; right: 0; }
  .lang-btn:hover { background: var(--card-hover); }

  /* Cards */
  .card {
    background: var(--card);
    border: 2px solid var(--card-border);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 14px;
    transition: transform 0.15s;
  }
  .card:active { transform: scale(0.98); }
  .card-title {
    display: flex; align-items: center; gap: 10px;
    font-size: 1.15rem; font-weight: 700; margin-bottom: 12px;
  }
  .card-icon { font-size: 1.8rem; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: center; }
  .stat-box {
    background: rgba(255,255,255,0.06); border-radius: 16px; padding: 14px 8px;
  }
  .stat-value { font-size: 2rem; font-weight: 800; }
  .stat-label { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

  /* Badge */
  .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 1rem; }
  .badge { padding: 5px 14px; border-radius: 20px; font-size: 0.9rem; font-weight: 700; }
  .badge-green { background: var(--green); color: #000; box-shadow: 0 0 12px var(--green-glow); }
  .badge-red { background: var(--red); color: #fff; box-shadow: 0 0 12px var(--red-glow); }
  .badge-yellow { background: var(--yellow); color: #000; box-shadow: 0 0 12px var(--yellow-glow); animation: pulse 1s ease infinite; }
  .badge-muted { background: rgba(255,255,255,0.1); color: var(--muted); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* Buttons */
  .btn {
    border: none; padding: 16px 24px; border-radius: 16px;
    font-size: 1.15rem; font-weight: 800; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    width: 100%; margin-top: 6px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover { transform: scale(1.02); }
  .btn:active { transform: scale(0.97); }
  .btn-green { background: var(--green); color: #000; box-shadow: 0 4px 20px var(--green-glow); }
  .btn-red { background: var(--red); color: #fff; box-shadow: 0 4px 20px var(--red-glow); }
  .btn-blue { background: var(--blue); color: #fff; box-shadow: 0 4px 20px var(--blue-glow); }
  .btn-off { background: rgba(255,255,255,0.08); color: var(--muted); }

  /* Select */
  select {
    width: 100%; padding: 14px; border-radius: 14px;
    border: 2px solid var(--card-border); background: rgba(255,255,255,0.06);
    color: var(--text); font-size: 1.05rem; font-weight: 600;
    margin-bottom: 8px; -webkit-appearance: none; appearance: none;
  }

  /* Logs */
  .logs {
    max-height: 200px; overflow-y: auto;
    font-family: 'Courier New', monospace; font-size: 0.8rem;
    line-height: 1.6; color: var(--muted);
    background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px;
  }
  .logs .entry { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .logs .time { color: #666; }
  .logs .motion { color: var(--yellow); font-weight: 600; }

  .footer { text-align: center; color: rgba(255,255,255,0.2); font-size: 0.75rem; margin-top: 16px; }
</style>
</head>
<body>

<div class="header">
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  <span class="mascot">🛡️</span>
  <h1 id="title">שומר החדר</h1>
</div>

<!-- Status -->
<div class="card">
  <div class="card-title"><span class="card-icon">📊</span> <span data-i18n="status">סטטוס</span></div>
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-value" id="motionCount">-</div>
      <div class="stat-label" data-i18n="motions_detected">תנועות שזוהו</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="lastEvent">-</div>
      <div class="stat-label" data-i18n="last_event">אירוע אחרון</div>
    </div>
  </div>
</div>

<!-- Motion Sensor -->
<div class="card">
  <div class="card-title"><span class="card-icon">👁️</span> <span data-i18n="motion_sensor">חיישן תנועה</span></div>
  <div class="status-row">
    <span data-i18n="sensor">חיישן</span>
    <span class="badge" id="armedBadge">—</span>
  </div>
  <button class="btn btn-green" id="sensorToggle" onclick="toggleSensor()">
    <span>🟢</span> <span data-i18n="arm">הפעל</span>
  </button>
</div>

<!-- LED -->
<div class="card">
  <div class="card-title"><span class="card-icon">💡</span> <span data-i18n="led_light">תאורה</span></div>
  <div class="status-row">
    <span data-i18n="light">אור</span>
    <span class="badge" id="ledBadge">—</span>
  </div>
  <button class="btn btn-off" id="ledToggle" onclick="toggleLed()">
    <span>💡</span> <span data-i18n="turn_on">הדלק</span>
  </button>
</div>

<!-- Melodies -->
<div class="card">
  <div class="card-title"><span class="card-icon">🎵</span> <span data-i18n="play_melody">נגן מנגינה</span></div>
  <select id="melodySelect"><option data-i18n="loading">טוען...</option></select>
  <button class="btn btn-blue" onclick="playMelody()">
    <span>▶️</span> <span data-i18n="play">נגן</span>
  </button>
</div>

<!-- LCD Message -->
<div class="card">
  <div class="card-title"><span class="card-icon">📺</span> <span data-i18n="lcd_message">הודעה למסך</span></div>
  <input type="text" id="lcdLine1" maxlength="16" placeholder="שורה 1 (עד 16 תווים)" data-i18n-placeholder="lcd_line1_ph" pattern="[ -~]*" style="width:100%;padding:14px;border-radius:14px;border:2px solid var(--card-border);background:rgba(255,255,255,0.06);color:var(--text);font-size:1.05rem;font-weight:600;margin-bottom:8px;">
  <input type="text" id="lcdLine2" maxlength="16" placeholder="שורה 2 (אופציונלי)" data-i18n-placeholder="lcd_line2_ph" pattern="[ -~]*" style="width:100%;padding:14px;border-radius:14px;border:2px solid var(--card-border);background:rgba(255,255,255,0.06);color:var(--text);font-size:1.05rem;font-weight:600;margin-bottom:8px;">
  <div id="lcdError" style="color:var(--red);font-size:0.85rem;margin-bottom:8px;display:none;" data-i18n="lcd_error">תווים לא נתמכים — רק אותיות, מספרים וסימנים באנגלית</div>
  <button class="btn btn-blue" onclick="sendLcdMessage()">
    <span>📺</span> <span data-i18n="send_to_lcd">שלח למסך</span>
  </button>
</div>

<!-- NFC Cards -->
<div class="card">
  <div class="card-title"><span class="card-icon">💳</span> <span data-i18n="nfc_cards">כרטיסי NFC</span></div>
  <div id="nfcStatus" style="font-size:0.85rem;color:var(--muted);margin-bottom:10px;" data-i18n="loading">טוען...</div>
  <div id="nfcCardList" style="margin-bottom:10px;"></div>
  <details style="margin-top:8px;">
    <summary style="cursor:pointer;color:var(--purple);font-weight:700;font-size:0.95rem;" data-i18n="nfc_add_card">➕ הוסף כרטיס</summary>
    <div style="margin-top:10px;">
      <div id="nfcScanArea">
        <button class="btn btn-blue" id="nfcScanBtn" onclick="startNfcScan()">
          <span>📡</span> <span data-i18n="nfc_scan">סרוק כרטיס</span>
        </button>
        <div id="nfcScannedUid" style="display:none;margin-top:8px;padding:10px;background:rgba(46,204,113,0.15);border-radius:12px;font-weight:700;text-align:center;"></div>
      </div>
      <input type="text" id="nfcLabel" placeholder="שם (למשל: מפתח של אבא)" data-i18n-placeholder="nfc_label_ph" style="width:100%;padding:12px;border-radius:12px;border:2px solid var(--card-border);background:rgba(255,255,255,0.06);color:var(--text);font-size:0.95rem;margin-bottom:6px;margin-top:8px;">
      <select id="nfcAction" style="width:100%;padding:12px;border-radius:12px;border:2px solid var(--card-border);background:rgba(255,255,255,0.06);color:var(--text);font-size:0.95rem;margin-bottom:8px;">
        <option value="toggle_arm" data-i18n="nfc_action_arm">הפעל/השבת חיישן</option>
        <option value="toggle_led" data-i18n="nfc_action_led">הדלק/כבה אור</option>
        <option value="play_random" data-i18n="nfc_action_play">נגן מנגינה</option>
        <option value="stop_melody" data-i18n="nfc_action_stop">עצור מנגינה</option>
        <option value="next_melody" data-i18n="nfc_action_next">מנגינה הבאה</option>
        <option value="prev_melody" data-i18n="nfc_action_prev">מנגינה קודמת</option>
      </select>
      <div id="nfcError" style="color:var(--red);font-size:0.85rem;margin-bottom:8px;display:none;"></div>
      <button class="btn btn-blue" id="nfcRegisterBtn" onclick="registerNfcCard()" style="display:none;">
        <span>💳</span> <span data-i18n="nfc_register">רשום כרטיס</span>
      </button>
    </div>
  </details>
  <div id="nfcLastScan" style="font-size:0.8rem;color:var(--muted);margin-top:10px;"></div>
</div>

<!-- Logs -->
<div class="card">
  <div class="card-title"><span class="card-icon">📋</span> <span data-i18n="recent_activity">פעילות אחרונה</span></div>
  <div class="logs" id="logContainer">
    <div class="entry" data-i18n="loading">טוען...</div>
  </div>
</div>

<div class="footer">
  <span data-i18n="footer">שומר החדר • רשת מקומית בלבד</span>
</div>

<script>
const API = '';
let _armed = false;
let _ledOn = false;

/* ── i18n ── */
const LANG = {
  he: {
    title: 'שומר החדר',
    status: 'סטטוס',
    motions_detected: 'תנועות שזוהו',
    last_event: 'אירוע אחרון',
    motion_sensor: 'חיישן תנועה',
    sensor: 'חיישן',
    arm: 'הפעל',
    disarm: 'השבת',
    armed: '● פעיל',
    disarmed: '○ מושבת',
    playing: '🎵 מנגן',
    led_light: 'תאורה',
    light: 'אור',
    turn_on: 'הדלק',
    turn_off: 'כבה',
    led_on: '● דלוק',
    led_off: '○ כבוי',
    play_melody: 'נגן מנגינה',
    play: 'נגן',
    recent_activity: 'פעילות אחרונה',
    no_events: 'אין אירועים עדיין',
    loading: 'טוען...',
    footer: 'שומר החדר • רשת מקומית בלבד',
    lang_toggle: 'EN',
    lcd_message: 'הודעה למסך',
    lcd_line1_ph: 'שורה 1 (עד 16 תווים)',
    lcd_line2_ph: 'שורה 2 (אופציונלי)',
    send_to_lcd: 'שלח למסך',
    lcd_error: 'תווים לא נתמכים — רק אותיות, מספרים וסימנים באנגלית',
    nfc_cards: 'כרטיסי NFC',
    nfc_add_card: '➕ הוסף כרטיס',
    nfc_uid_ph: 'UID (למשל 0x1A2B3C4D)',
    nfc_label_ph: 'שם (למשל: מפתח של אבא)',
    nfc_action_arm: 'הפעל/השבת חיישן',
    nfc_action_led: 'הדלק/כבה אור',
    nfc_action_play: 'נגן מנגינה',
    nfc_action_stop: 'עצור מנגינה',
    nfc_action_next: 'מנגינה הבאה',
    nfc_action_prev: 'מנגינה קודמת',
    nfc_register: 'רשום כרטיס',
    nfc_no_reader: 'קורא NFC לא מחובר',
    nfc_no_cards: 'אין כרטיסים רשומים',
    nfc_last_scan: 'סריקה אחרונה',
    nfc_remove_confirm: 'להסיר כרטיס זה?',
    nfc_scan: 'סרוק כרטיס',
    nfc_scanning: 'מחכה לכרטיס... הצמד כרטיס לקורא',
    nfc_scan_ok: 'כרטיס נסרק!',
    nfc_scan_timeout: 'לא זוהה כרטיס — נסה שוב',
  },
  en: {
    title: 'Room Guard',
    status: 'Status',
    motions_detected: 'Motions Detected',
    last_event: 'Last Event',
    motion_sensor: 'Motion Sensor',
    sensor: 'Sensor',
    arm: 'Arm',
    disarm: 'Disarm',
    armed: '● Armed',
    disarmed: '○ Disarmed',
    playing: '🎵 Playing',
    led_light: 'LED Light',
    light: 'Light',
    turn_on: 'Turn On',
    turn_off: 'Turn Off',
    led_on: '● On',
    led_off: '○ Off',
    play_melody: 'Play Melody',
    play: 'Play',
    recent_activity: 'Recent Activity',
    no_events: 'No events yet',
    loading: 'Loading...',
    footer: 'Room Guard • Local Network Only',
    lang_toggle: 'עב',
    lcd_message: 'LCD Message',
    lcd_line1_ph: 'Line 1 (max 16 chars)',
    lcd_line2_ph: 'Line 2 (optional)',
    send_to_lcd: 'Send to LCD',
    lcd_error: 'Unsupported characters — use English letters, numbers & symbols only',
    nfc_cards: 'NFC Cards',
    nfc_add_card: '➕ Add Card',
    nfc_uid_ph: 'UID (e.g. 0x1A2B3C4D)',
    nfc_label_ph: 'Name (e.g. Dad\'s key fob)',
    nfc_action_arm: 'Arm / Disarm sensor',
    nfc_action_led: 'Toggle LED on/off',
    nfc_action_play: 'Play melody',
    nfc_action_stop: 'Stop melody',
    nfc_action_next: 'Next melody',
    nfc_action_prev: 'Previous melody',
    nfc_register: 'Register Card',
    nfc_no_reader: 'NFC reader not connected',
    nfc_no_cards: 'No cards registered',
    nfc_last_scan: 'Last scan',
    nfc_remove_confirm: 'Remove this card?',
    nfc_scan: 'Scan Card',
    nfc_scanning: 'Waiting for card... hold it near the reader',
    nfc_scan_ok: 'Card scanned!',
    nfc_scan_timeout: 'No card detected — try again',
  }
};

let currentLang = localStorage.getItem('rg_lang') || 'he';

function t(key) { return LANG[currentLang][key] || key; }

function applyLang() {
  const html = document.documentElement;
  html.lang = currentLang;
  html.dir = currentLang === 'he' ? 'rtl' : 'ltr';
  document.title = (currentLang === 'he' ? '🛡️ שומר החדר' : '🛡️ Room Guard');
  document.getElementById('title').textContent = t('title');
  document.getElementById('langBtn').textContent = t('lang_toggle');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (key !== 'loading' || el.tagName !== 'OPTION') {
      el.textContent = t(key);
    }
  });
  // Re-sync dynamic elements
  refreshStatus();
  // Update placeholders
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
}

function toggleLang() {
  currentLang = currentLang === 'he' ? 'en' : 'he';
  localStorage.setItem('rg_lang', currentLang);
  applyLang();
}

/* ── API ── */
async function postAction(url) {
  try { await fetch(API + url, { method: 'POST' }); refreshStatus(); } catch(e) { console.error(e); }
}

async function toggleSensor() {
  await postAction(_armed ? '/api/disarm' : '/api/arm');
}

async function toggleLed() {
  await postAction(_ledOn ? '/api/led/off' : '/api/led/on');
}

async function playMelody() {
  const name = document.getElementById('melodySelect').value;
  if (!name) return;
  try { await fetch(API + '/api/play/' + encodeURIComponent(name), { method: 'POST' }); } catch(e) { console.error(e); }
}

async function sendLcdMessage() {
  const lcdValid = /^[ -~]*$/;  // ASCII 0x20–0x7E
  const line1 = document.getElementById('lcdLine1').value;
  const line2 = document.getElementById('lcdLine2').value;
  const errEl = document.getElementById('lcdError');
  if (!line1 && !line2) return;
  if (!lcdValid.test(line1) || !lcdValid.test(line2)) {
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';
  try {
    await fetch(API + '/api/lcd/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line1, line2 })
    });
    document.getElementById('lcdLine1').value = '';
    document.getElementById('lcdLine2').value = '';
  } catch(e) { console.error(e); }
}

// Live-filter LCD inputs: strip unsupported characters as user types
document.querySelectorAll('#lcdLine1, #lcdLine2').forEach(el => {
  el.addEventListener('input', () => {
    const clean = el.value.replace(/[^ -~]/g, '');
    if (clean !== el.value) {
      el.value = clean;
      document.getElementById('lcdError').style.display = 'block';
      setTimeout(() => document.getElementById('lcdError').style.display = 'none', 3000);
    }
  });
});

async function refreshStatus() {
  try {
    const r = await fetch(API + '/api/status');
    const d = await r.json();
    document.getElementById('motionCount').textContent = d.motion_count;
    document.getElementById('lastEvent').textContent = d.last_event ? d.last_event.split(' ')[1] : '—';

    const ab = document.getElementById('armedBadge');
    if (d.playing) { ab.textContent = t('playing'); ab.className = 'badge badge-yellow'; }
    else if (d.armed) { ab.textContent = t('armed'); ab.className = 'badge badge-green'; }
    else { ab.textContent = t('disarmed'); ab.className = 'badge badge-muted'; }

    const lb = document.getElementById('ledBadge');
    lb.textContent = d.led_on ? t('led_on') : t('led_off');
    lb.className = d.led_on ? 'badge badge-green' : 'badge badge-muted';

    _armed = d.armed;
    _ledOn = d.led_on;

    const st = document.getElementById('sensorToggle');
    if (d.armed) {
      st.className = 'btn btn-red';
      st.innerHTML = `<span>🔴</span> <span>${t('disarm')}</span>`;
    } else {
      st.className = 'btn btn-green';
      st.innerHTML = `<span>🟢</span> <span>${t('arm')}</span>`;
    }

    const lt = document.getElementById('ledToggle');
    if (d.led_on) {
      lt.className = 'btn btn-red';
      lt.innerHTML = `<span>💡</span> <span>${t('turn_off')}</span>`;
    } else {
      lt.className = 'btn btn-off';
      lt.innerHTML = `<span>💡</span> <span>${t('turn_on')}</span>`;
    }
  } catch(e) { console.error(e); }
}

async function refreshLogs() {
  try {
    const r = await fetch(API + '/api/logs?limit=30');
    const d = await r.json();
    const c = document.getElementById('logContainer');
    if (!d.logs.length) { c.innerHTML = `<div class="entry">${t('no_events')}</div>`; return; }
    c.innerHTML = d.logs.map(l => {
      const cls = l.message.includes('MOTION') ? ' motion' : '';
      return `<div class="entry${cls}"><span class="time">${l.time.split(' ')[1]}</span> ${l.message}</div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

async function loadMelodies() {
  try {
    const r = await fetch(API + '/api/melodies');
    const d = await r.json();
    const sel = document.getElementById('melodySelect');
    sel.innerHTML = d.melodies.map(m => `<option value="${m}">🎶 ${m}</option>`).join('');
  } catch(e) { console.error(e); }
}

// NFC card management
const NFC_ACTION_LABELS = {
  toggle_arm: () => t('nfc_action_arm'),
  toggle_led: () => t('nfc_action_led'),
  play_random: () => t('nfc_action_play'),
  stop_melody: () => t('nfc_action_stop'),
  next_melody: () => t('nfc_action_next'),
  prev_melody: () => t('nfc_action_prev'),
};

function nfcActionLabel(action) {
  if (NFC_ACTION_LABELS[action]) return NFC_ACTION_LABELS[action]();
  if (action.startsWith('play_melody:')) return '🎶 ' + action.split(':')[1];
  return action;
}

async function refreshNfcCards() {
  try {
    const r = await fetch(API + '/api/nfc/cards');
    const d = await r.json();
    const statusEl = document.getElementById('nfcStatus');
    const listEl = document.getElementById('nfcCardList');

    if (!d.available) {
      statusEl.textContent = t('nfc_no_reader');
      listEl.innerHTML = '';
      return;
    }

    if (!d.cards.length) {
      statusEl.textContent = t('nfc_no_cards');
      listEl.innerHTML = '';
      return;
    }

    statusEl.textContent = `${d.cards.length} 💳`;
    listEl.innerHTML = d.cards.map(c => `
      <div style="display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.06);border-radius:12px;padding:10px 12px;margin-bottom:6px;">
        <div>
          <div style="font-weight:700;font-size:0.95rem;">${c.label || c.uid}</div>
          <div style="font-size:0.8rem;color:var(--muted);">${c.uid} → ${nfcActionLabel(c.action)}</div>
        </div>
        <button onclick="removeNfcCard('${c.uid}')" style="background:var(--red);color:#fff;border:none;border-radius:10px;padding:6px 12px;cursor:pointer;font-size:0.85rem;font-weight:700;">✕</button>
      </div>
    `).join('');

    // Last scan
    const sr = await fetch(API + '/api/nfc/last-scan');
    const sd = await sr.json();
    const scanEl = document.getElementById('nfcLastScan');
    if (sd.last_scan) {
      scanEl.textContent = `${t('nfc_last_scan')}: ${sd.last_scan.uid} (${sd.last_scan.time.split(' ')[1]})`;
    } else {
      scanEl.textContent = '';
    }
  } catch(e) { console.error(e); }
}

let _nfcScannedUid = null;

async function startNfcScan() {
  const scanBtn = document.getElementById('nfcScanBtn');
  const uidEl = document.getElementById('nfcScannedUid');
  const regBtn = document.getElementById('nfcRegisterBtn');
  const errEl = document.getElementById('nfcError');
  errEl.style.display = 'none';

  // Show scanning state
  scanBtn.disabled = true;
  scanBtn.innerHTML = `<span>📡</span> <span>${t('nfc_scanning')}</span>`;
  scanBtn.className = 'btn btn-off';
  uidEl.style.display = 'none';
  regBtn.style.display = 'none';
  _nfcScannedUid = null;

  try {
    // Start scan mode (returns immediately)
    const startRes = await fetch(API + '/api/nfc/scan/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ timeout: 15 })
    });
    const startData = await startRes.json();
    if (!startData.ok) {
      errEl.textContent = startData.error || 'NFC not available';
      errEl.style.display = 'block';
      scanBtn.disabled = false;
      scanBtn.innerHTML = `<span>📡</span> <span>${t('nfc_scan')}</span>`;
      scanBtn.className = 'btn btn-blue';
      return;
    }

    // Poll for result every 500ms, up to 30 attempts (15s)
    let found = false;
    for (let i = 0; i < 30; i++) {
      await new Promise(r => setTimeout(r, 500));
      const pollRes = await fetch(API + '/api/nfc/scan/result');
      const pollData = await pollRes.json();
      if (pollData.status === 'found') {
        _nfcScannedUid = pollData.uid;
        uidEl.textContent = `✅ ${t('nfc_scan_ok')} UID: ${pollData.uid}`;
        uidEl.style.display = 'block';
        regBtn.style.display = 'flex';
        found = true;
        break;
      }
      if (pollData.status === 'timeout' || pollData.status === 'idle') break;
    }
    if (!found) {
      errEl.textContent = t('nfc_scan_timeout');
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  }

  // Reset scan button
  scanBtn.disabled = false;
  scanBtn.innerHTML = `<span>📡</span> <span>${t('nfc_scan')}</span>`;
  scanBtn.className = 'btn btn-blue';
}

async function registerNfcCard() {
  const label = document.getElementById('nfcLabel').value.trim();
  const action = document.getElementById('nfcAction').value;
  const errEl = document.getElementById('nfcError');

  if (!_nfcScannedUid) { errEl.textContent = t('nfc_scan'); errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  try {
    const r = await fetch(API + '/api/nfc/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uid: _nfcScannedUid, action, label })
    });
    const d = await r.json();
    if (!d.ok) { errEl.textContent = d.error; errEl.style.display = 'block'; return; }
    // Reset form
    _nfcScannedUid = null;
    document.getElementById('nfcLabel').value = '';
    document.getElementById('nfcScannedUid').style.display = 'none';
    document.getElementById('nfcRegisterBtn').style.display = 'none';
    refreshNfcCards();
  } catch(e) { console.error(e); }
}

async function removeNfcCard(uid) {
  if (!confirm(t('nfc_remove_confirm'))) return;
  try {
    await fetch(API + '/api/nfc/cards/' + encodeURIComponent(uid), { method: 'DELETE' });
    refreshNfcCards();
  } catch(e) { console.error(e); }
}

// Initial load
applyLang();
loadMelodies();
refreshStatus();
refreshLogs();
refreshNfcCards();

// Auto-refresh
setInterval(refreshStatus, 3000);
setInterval(refreshLogs, 5000);
setInterval(refreshNfcCards, 10000);
</script>
